name: Build & push Prism (GPU)

# Builds the bge-m3 GPU image and pushes it to Docker Hub. Run on demand; then
# deploy it to RunPod (prism-agience-ai → Deploy Prism to RunPod) and point
# Mantle's EMBEDDINGS_URI at the pod. Mirrors the core suite's build pattern
# (DOCKERHUB_NAMESPACE / DOCKERHUB_TOKEN secrets).
#
# The image needs the agience-kit SDK as a build context until it's on PyPI,
# so this checks out agience-kit too (repo/ref overridable via repo Variables
# KIT_REPO / KIT_REF).

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Extra image tag to also push (always pushes :gpu)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout prism
        uses: actions/checkout@v4
        with:
          path: agience-prism

      - name: Checkout kit (build context)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.KIT_REPO || 'Agience/agience-kit' }}
          ref: ${{ vars.KIT_REF || 'main' }}
          path: agience-kit

      - name: Free disk space (CUDA base is large)
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android "/opt/hostedtoolcache/CodeQL" || true
          sudo docker image prune -af || true
          df -h /

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_NAMESPACE }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          NS="${{ secrets.DOCKERHUB_NAMESPACE }}"
          TAGS="${NS}/agience-prism:gpu"
          EXTRA="${{ github.event.inputs.tag }}"
          [ -n "$EXTRA" ] && TAGS="${TAGS},${NS}/agience-prism:${EXTRA}"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: agience-prism
          file: agience-prism/Dockerfile.gpu
          build-contexts: |
            kit=agience-kit
          push: true
          tags: ${{ steps.tags.outputs.tags }}
